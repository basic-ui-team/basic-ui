name: Component Development
description: Track development of a new component
labels: ['component', 'v1.0']
assignees: []
body:
  - type: input
    id: component_name
    attributes:
      label: Component Name
      placeholder: 'e.g., Button, Dropdown'

  - type: textarea
    id: overview
    attributes:
      label: Overview
      placeholder: |
        Brief description and proposed API usage.
        Include a code example of how developers will use it.

  - type: textarea
    id: checklist
    attributes:
      label: Implementation Checklist
      placeholder: |
        - [ ] Component implemented
        - [ ] Unit tests (>80% coverage)
        - [ ] Storybook stories
        - [ ] Accessibility verified
        - [ ] Documentation written
