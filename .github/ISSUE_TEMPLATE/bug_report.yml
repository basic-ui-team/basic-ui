name: Bug Report
description: Report a bug or unexpected behavior
labels: ['bug']
assignees: []
body:
  - type: input
    id: component
    attributes:
      label: Component(s) affected
      placeholder: 'e.g., Button, Dialog'

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: |
        What happened?
        What did you expect to happen?

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Import the component
        2. Set prop X to Y
        3. Notice that...

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: 'Browser, OS, Node version, etc.'
